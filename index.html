<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eseih Fejiro Emmanuel | Portfolio Coming Soon</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            max-width: 800px;
            width: 100%;
            padding: 40px 20px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00dbde, #fc00ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 1px;
        }

        .logo span {
            color: #00dbde;
        }

        .title {
            font-size: 3.5rem;
            margin: 20px 0;
            font-weight: 700;
            line-height: 1.2;
        }

        .highlight {
            color: #00dbde;
            position: relative;
            display: inline-block;
        }

        .highlight::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #00dbde, transparent);
        }

        .tagline {
            font-size: 1.3rem;
            margin-bottom: 40px;
            color: #e0e0e0;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .countdown {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 40px 0;
            flex-wrap: wrap;
        }

        .countdown-item {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px 15px;
            min-width: 100px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .countdown-value {
            font-size: 2.8rem;
            font-weight: 700;
            display: block;
            color: #00dbde;
        }

        .countdown-label {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
            color: #ccc;
        }

        .contact-info {
            margin: 40px 0 30px;
        }

        .contact-title {
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: #ccc;
        }

        .email-link {
            color: #00dbde;
            font-size: 1.3rem;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            padding: 5px 10px;
            border-radius: 5px;
        }

        .email-link:hover {
            background: rgba(0, 219, 222, 0.1);
            text-shadow: 0 0 10px rgba(0, 219, 222, 0.5);
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .social-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1.3rem;
            text-decoration: none;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .social-icon:hover {
            background: rgba(0, 219, 222, 0.2);
            transform: translateY(-5px);
            border-color: #00dbde;
        }

        .footer {
            margin-top: 40px;
            color: #aaa;
            font-size: 0.9rem;
        }

        .notify-btn {
            background: linear-gradient(90deg, #00dbde, #0072ff);
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 114, 255, 0.3);
        }

        .notify-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 114, 255, 0.4);
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .title {
                font-size: 2.5rem;
            }
            
            .countdown-item {
                min-width: 80px;
                padding: 15px 10px;
            }
            
            .countdown-value {
                font-size: 2.2rem;
            }
            
            .email-link {
                font-size: 1.1rem;
            }
        }

        @media (max-width: 480px) {
            .title {
                font-size: 2rem;
            }
            
            .container {
                padding: 30px 15px;
            }
            
            .countdown {
                gap: 10px;
            }
            
            .countdown-item {
                min-width: 70px;
                padding: 12px 8px;
            }
            
            .countdown-value {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">EFE<span>Portfolio</span></div>
        
        <h1 class="title">
            <span class="highlight">Eseih Fejiro Emmanuel</span>
        </h1>
        
        <p class="tagline">
            Innovative developer & creative problem solver. My portfolio is under construction, 
            but something amazing is coming soon!
        </p>
        
        <div class="countdown">
            <div class="countdown-item">
                <span id="days" class="countdown-value">00</span>
                <span class="countdown-label">Days</span>
            </div>
            <div class="countdown-item">
                <span id="hours" class="countdown-value">00</span>
                <span class="countdown-label">Hours</span>
            </div>
            <div class="countdown-item">
                <span id="minutes" class="countdown-value">00</span>
                <span class="countdown-label">Minutes</span>
            </div>
            <div class="countdown-item">
                <span id="seconds" class="countdown-value">00</span>
                <span class="countdown-label">Seconds</span>
            </div>
        </div>
        
        <div class="contact-info">
            <p class="contact-title">Get in touch:</p>
            <a href="mailto:eseihfejiro@gmail.com" class="email-link">eseihfejiro@gmail.com</a>
        </div>
        
        <button class="notify-btn" onclick="notifyMe()">
            <i class="fas fa-bell"></i> Notify Me When It's Live
        </button>
        
        <div class="social-links">
            <a href="#" class="social-icon">
                <i class="fab fa-github"></i>
            </a>
            <a href="#" class="social-icon">
                <i class="fab fa-linkedin-in"></i>
            </a>
            <a href="#" class="social-icon">
                <i class="fab fa-twitter"></i>
            </a>
            <a href="#" class="social-icon">
                <i class="fab fa-instagram"></i>
            </a>
        </div>
    </div>
    
    <div class="footer">
        &copy; 2023 Eseih Fejiro Emmanuel. All rights reserved.
    </div>

    <script>
        // Set the date we're counting down to (2 weeks from now)
        const countDownDate = new Date();
        countDownDate.setDate(countDownDate.getDate() + 14); // 2 weeks from today
        
        // Update the countdown every 1 second
        const countdownFunction = setInterval(function() {
            const now = new Date().getTime();
            const distance = countDownDate - now;
            
            // Calculate days, hours, minutes, seconds
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);
            
            // Display the results
            document.getElementById("days").innerHTML = days.toString().padStart(2, '0');
            document.getElementById("hours").innerHTML = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerHTML = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerHTML = seconds.toString().padStart(2, '0');
            
            // If the countdown is finished, display a message
            if (distance < 0) {
                clearInterval(countdownFunction);
                document.querySelector(".countdown").innerHTML = "<h2>Portfolio is Live!</h2>";
            }
        }, 1000);
        
        // Notification button function
        function notifyMe() {
            const email = prompt("Please enter your email address to get notified:", "your@email.com");
            if (email) {
                alert(`Thank you! We'll notify you at ${email} when the portfolio is live.`);
                // In a real implementation, you would send this to your backend
                console.log(`Email collected for notification: ${email}`);
            }
        }
        
        // Add social media links (replace with your actual URLs)
        document.addEventListener('DOMContentLoaded', function() {
            const socialLinks = document.querySelectorAll('.social-icon');
            const platforms = [
                'https://github.com/yourusername',
                'https://linkedin.com/in/yourusername',
                'https://twitter.com/yourusername',
                'https://instagram.com/yourusername'
            ];
            
            socialLinks.forEach((link, index) => {
                link.href = platforms[index];
            });
        });
    </script>
</body>
</html>
